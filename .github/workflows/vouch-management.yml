name: ChainVouch Vouch Management
on:
  issue_comment:
    types: [created]

jobs:
  handle-vouch-command:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '/vouch ') ||
      contains(github.event.comment.body, '/denounce ') ||
      contains(github.event.comment.body, '/unvouch ')
    steps:
      - uses: actions/checkout@v4

      - name: Parse comment and run ChainVouch command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          npm install

          # Extract command and target username from comment
          if echo "$COMMENT_BODY" | grep -qP '^/vouch @\S+'; then
            TARGET=$(echo "$COMMENT_BODY" | grep -oP '^/vouch @\K\S+')
            echo "Running: node cli.js vouch for @${TARGET} by ${COMMENTER}"
            node cli.js vouch "$GITHUB_REPOSITORY" "$TARGET" "$COMMENTER" "vouched via GitHub comment"
          elif echo "$COMMENT_BODY" | grep -qP '^/denounce @\S+'; then
            TARGET=$(echo "$COMMENT_BODY" | grep -oP '^/denounce @\K\S+')
            echo "Running: node cli.js denounce for @${TARGET} by ${COMMENTER}"
            node cli.js denounce "$GITHUB_REPOSITORY" "$TARGET" "$COMMENTER" "denounced via GitHub comment"
          elif echo "$COMMENT_BODY" | grep -qP '^/unvouch @\S+'; then
            TARGET=$(echo "$COMMENT_BODY" | grep -oP '^/unvouch @\K\S+')
            echo "Running: node cli.js denounce (unvouch) for @${TARGET} by ${COMMENTER}"
            node cli.js denounce "$GITHUB_REPOSITORY" "$TARGET" "$COMMENTER" "unvouched via GitHub comment"
          fi
