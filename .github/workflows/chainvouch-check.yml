name: ChainVouch PR Check
on: [pull_request]
jobs:
  check-reputation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ChainVouch Check
        run: |
          npm install
          node cli.js check ${{ github.event.pull_request.user.login }}
        # Exit codes: 0 = TRUSTED, 1 = DENOUNCED, 2 = UNVERIFIED
        # The step fails (blocking merge) for exit codes 1 and 2.
